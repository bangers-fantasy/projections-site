<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Fantasy Hockey</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
(function(){try{var t=localStorage.getItem('theme');if(t!=='dark'&&t!=='light')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<style>
  :root {
    --bg: #eef1f5; --card: #ffffff; --ink: #1b2733; --muted: #7a8a99;
    --line: #e6ebf0; --accent: #2b6cb0; --accent-rgb: 43,108,176; --chip: #eef3f8;
    --shadow: 0 1px 2px rgba(16,32,48,.06), 0 8px 24px rgba(16,32,48,.06);
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          margin: 0; background: var(--bg); color: var(--ink); line-height: 1.4;
          -webkit-font-smoothing: antialiased; }
  a { color: inherit; }

  header.top { position: sticky; top: 0; z-index: 10;
          background: linear-gradient(135deg, #16283a 0%, #1f3b52 100%);
          color: #fff; box-shadow: 0 2px 12px rgba(16,32,48,.18); }
  .topinner { max-width: 1120px; margin: 0 auto; padding: 13px 24px;
          display: flex; gap: 18px; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700;
          letter-spacing: -.01em; white-space: nowrap; }
  .brand-mark { font-size: 22px; line-height: 1; }
  .brand-txt { display: flex; flex-direction: column; line-height: 1.16; }
  .brand-txt b { font-size: 18px; }
  .brand small { font-size: 12px; font-weight: 400; color: #9fb8cf; }
  .searchbar { border-top: 1px solid rgba(255,255,255,.10); }
  .searchbar form { max-width: 1120px; margin: 0 auto; padding: 10px 24px;
          display: flex; gap: 10px; align-items: center; }
  form { display: flex; gap: 10px; }
  input[type=text] { flex: 1; min-width: 160px; padding: 9px 13px; font-size: 14px;
          border: 1px solid rgba(255,255,255,.16); border-radius: 9px;
          background: rgba(255,255,255,.10); color: #fff; }
  input[type=text]::placeholder { color: #b8c8d8; }
  input[type=text]:focus { outline: none; border-color: #6aa6dd;
          background: rgba(255,255,255,.16); }
  select { padding: 9px 11px; font-size: 13.5px; border: 1px solid rgba(255,255,255,.16);
          border-radius: 9px; background: rgba(255,255,255,.10); color: #fff; }
  select option { color: #1b2733; }
  button { padding: 9px 18px; font-size: 14px; font-weight: 600; color: #fff;
          background: var(--accent); border: 0; border-radius: 9px; cursor: pointer;
          white-space: nowrap; transition: background .12s; }
  button:hover { background: #3a7cc0; }

  /* Custom search autocomplete (datalist is unreliable on mobile Safari). */
  .search { position: relative; flex: 0 1 440px; min-width: 200px; display: flex; }
  .search input[type=text] { width: 100%; }
  .ac { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 50; display: none;
          background: #fff; color: #1b2733; border-radius: 10px; overflow-y: auto;
          max-height: 320px; box-shadow: 0 10px 28px rgba(16,32,48,.28);
          -webkit-overflow-scrolling: touch; }
  .ac-item { padding: 11px 14px; font-size: 15px; cursor: pointer; border-bottom: 1px solid #eef1f5;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ac-item:last-child { border-bottom: 0; }
  .ac-item.on, .ac-item:hover { background: #eef4fb; }

  .wrap { max-width: 1120px; margin: 0 auto; padding: 26px 24px 60px; }
  .eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase;
          letter-spacing: .08em; color: var(--muted); margin: 0 0 10px 2px; }
  .card { background: var(--card); border-radius: 16px; padding: 26px;
          box-shadow: var(--shadow); margin-bottom: 22px; }

  .hero { display: flex; flex-wrap: wrap; gap: 22px 26px; align-items: flex-start;
          justify-content: flex-start; }
  .hero-id { flex: 0 1 340px; min-width: 260px; }
  .hero-id h2 { margin: 0; font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .chip { background: var(--chip); color: #35506b; font-size: 13px; font-weight: 600;
          padding: 6px 12px; border-radius: 999px; }

  .projwrap { flex: 0 1 auto; max-width: 100%; overflow-x: auto; background: #fafbfd;
          border: 1px solid var(--line); border-radius: 16px; padding: 14px 22px 16px; }
  table.projcard { border-collapse: separate; border-spacing: 0; }
  table.projcard th { font-size: 12px; font-weight: 800; color: #223b52;
          padding: 0 0 12px 20px; text-align: right; line-height: 1.3; }
  table.projcard th span { display: block; font-size: 9.5px; font-weight: 600;
          color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  table.projcard th.mh { text-align: left; text-transform: uppercase; font-size: 10px;
          letter-spacing: .05em; color: var(--muted); padding-left: 0; vertical-align: bottom; }
  table.projcard td { padding: 6px 0 6px 20px; text-align: right; font-size: 15px;
          font-variant-numeric: tabular-nums; color: #46586a; }
  table.projcard td.metric { text-align: left; font-weight: 600; font-size: 13px;
          color: #2b3f52; padding-left: 0; }
  table.projcard td.pj { font-weight: 800; color: #17324b; font-size: 16px; }
  table.projcard tr + tr td { border-top: 1px solid var(--line); }
  table.projcard tr.pts td { background: #eef4fb; }
  table.projcard tr.pts td.metric { border-top-left-radius: 7px; border-bottom-left-radius: 7px; }
  table.projcard tr.pts td:last-child { border-top-right-radius: 7px; border-bottom-right-radius: 7px; }
  table.projcard tr.pts td.pj { color: #1c5fa8; }
  /* TOI / PP TOI rows (minutes/GP) leading the table — muted vs the per-82 counts */
  table.projcard tr.toi td { color: #5f7183; }
  table.projcard tr.toi td.metric { color: #48586a; }
  table.projcard tr.toi td.pj { color: #2f4d66; }
  /* Projection table + banger panel side by side */
  .proj-side { flex: 1 1 300px; min-width: 240px; display: flex; flex-direction: column;
          justify-content: flex-start; align-self: stretch; }
  .proj-side .method { margin-top: auto; padding-top: 16px; }
  /* Positional ranking ladder — league-wide, same position, beside the per-82 table */
  .depth { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px;
          background: var(--card); }
  .dl-head { display: flex; flex-direction: column; gap: 2px; margin-bottom: 11px;
          font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em;
          color: var(--ink); }
  .dl-sub { font-size: 11.5px; font-weight: 600; text-transform: none; letter-spacing: 0;
          color: var(--muted); }
  .dl-body { display: flex; flex-direction: column; gap: 3px; }
  .dl-row { display: grid; grid-template-columns: 26px 1fr 66px 32px; align-items: center;
          gap: 9px; padding: 5px 8px; border-radius: 8px; font-size: 13px; }
  .dl-row.me { background: var(--chip); }
  .dl-rk { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 12px;
          color: var(--muted); text-align: right; }
  .dl-row.me .dl-rk { color: var(--accent); }
  .dl-nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink); }
  .dl-row.me .dl-nm { font-weight: 800; }
  .dl-bar { height: 8px; background: var(--line); border-radius: 999px; overflow: hidden;
          display: flex; }
  .dl-bar i { display: block; height: 100%; }
  .dl-bar i.off { background: #f26b53; }
  .dl-bar i.per { background: #5f93c6; }
  .dl-sc { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 12.5px;
          color: var(--ink); text-align: right; }
  .dl-foot { margin-top: 11px; display: flex; flex-wrap: wrap; align-items: center;
          gap: 5px 12px; font-size: 10.5px; line-height: 1.4; color: var(--muted); }
  .dl-key { display: inline-flex; align-items: center; gap: 5px; }
  .dl-key i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
  .dl-key i.off { background: #f26b53; }
  .dl-key i.per { background: #5f93c6; }
  .dl-vor { margin-left: auto; font-style: italic; }
  /* Banger score — the card's headline metric, its own panel */
  .bpanel { flex: 1 1 220px; align-self: flex-start; min-width: 220px; max-width: 340px;
          margin-top: 16px;
          background: linear-gradient(160deg, #2f74bd 0%, #255e9e 100%);
          border-radius: 16px; padding: 18px 20px 16px; color: #fff;
          box-shadow: 0 6px 18px rgba(31,74,120,.22); }
  .bp-head { font-size: 11px; font-weight: 700; text-transform: uppercase;
          letter-spacing: .08em; color: rgba(255,255,255,.72); }
  .bp-big { font-size: 46px; font-weight: 800; line-height: 1.05; letter-spacing: -.02em;
          margin: 2px 0 10px; font-variant-numeric: tabular-nums; }
  .bp-ranks { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .bp-rk { background: rgba(255,255,255,.16); border-radius: 999px;
          padding: 4px 10px; font-size: 12px; font-weight: 600;
          font-variant-numeric: tabular-nums; }
  .bp-rk b { font-weight: 800; letter-spacing: .02em; }
  .bp-rk.bp-ov { background: rgba(255,255,255,.09); color: rgba(255,255,255,.82); }
  .bp-of { color: rgba(255,255,255,.60); margin-left: 3px; }
  .bp-split { display: flex; gap: 10px; }
  .bp-cell { flex: 1; background: rgba(255,255,255,.12); border-radius: 10px;
          padding: 9px 12px; }
  .bp-l { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
          letter-spacing: .05em; color: rgba(255,255,255,.7); }
  .bp-v { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .bp-v.pos { color: #a7f0c4; }
  .bp-v.neg { color: #ffc4bd; }
  .bp-note { font-size: 10.5px; line-height: 1.4; color: rgba(255,255,255,.62);
          margin-top: 12px; }
  .sample { font-size: 12.5px; color: var(--muted); margin: 10px 0 0; }
  .adjmark { font-size: 9px; margin-right: 3px; vertical-align: 1px; }
  .adjtag { display: inline-block; font-size: 8.5px; font-weight: 700; letter-spacing: .04em;
             text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent);
             border-radius: 3px; padding: 0 3px; margin-left: 4px; vertical-align: 1px; }
  .projcard td.pj.adj { font-weight: 600; }
  .adjnote { font-size: 11.5px; color: var(--muted); margin: 8px 2px 0; line-height: 1.45; }
  .adjnote strong { color: var(--ink); }

  /* Similar & complementary players box */
  .mk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .mk-head { font-size: 15px; font-weight: 800; color: #2b3f52; }
  .mk-pos { font-size: 12px; font-weight: 600; color: var(--muted); }
  .mk-sub { font-size: 12px; color: var(--muted); margin: 2px 0 12px; }
  .mk-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }
  .mk-list li { display: flex; flex-direction: column; gap: 4px; padding: 10px 13px;
          background: #f5f8fb; border: 1px solid var(--line); border-radius: 10px; }
  .mk-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .mk-name { font-size: 14.5px; font-weight: 700; color: #22303d; }
  .pl-link { color: inherit; text-decoration: none; }
  .pl-link:hover { text-decoration: underline; text-decoration-color: var(--accent);
          text-underline-offset: 2px; }
  .mk-meta { font-size: 11.5px; font-weight: 500; color: var(--muted); }
  .mk-badge { margin-left: auto; font-size: 11px; font-weight: 800; color: #1c5fa8;
          background: #eaf2fb; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
  .mk-badge.cov { color: #2f7d53; background: #e7f4ec; }
  .mk-tags { font-size: 12px; color: #5b6b7b; }
  .mk-tags b { color: #2b3f52; font-weight: 700; }
  .mk-none { color: var(--muted); font-size: 13px; }
  @media (max-width: 640px) { .mk-grid { grid-template-columns: 1fr; gap: 20px; } }
  /* Profile-shape radars (similar overlaps, complementary diverges) */
  .rd-head { margin: 26px 0 0; font-size: 12px; font-weight: 700; color: var(--muted);
          line-height: 1.4; }
  .rd-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 12px; }
  .rd-cell { display: flex; flex-direction: column; align-items: center; text-align: center;
          background: #f5f8fb; border: 1px solid var(--line); border-radius: 12px;
          padding: 12px 8px 11px; }
  .rd-title { font-size: 12.5px; font-weight: 800; color: #2b3f52; margin-bottom: 4px; }
  .radar { width: 100%; max-width: 212px; height: auto; display: block; }
  .rd-ring { fill: none; stroke: var(--line); stroke-width: 1; }
  .rd-spoke { stroke: var(--line); stroke-width: 1; }
  .rd-lab { font-size: 9px; font-weight: 700; fill: var(--muted); }
  .rd-focal { fill: rgba(58,134,200,.24); stroke: #3a86c8; stroke-width: 2;
          stroke-linejoin: round; }
  .rd-ref { fill: rgba(58,134,200,.12); stroke: rgba(58,134,200,.65); stroke-width: 1.5;
          stroke-dasharray: 3 2; stroke-linejoin: round; }
  .rd-grp { fill: none; stroke-width: 1.7; stroke-linejoin: round; opacity: .55; }
  .rd-grp.sim { stroke: #2f9e69; }
  .rd-grp.comp { stroke: #e6822e; }
  .rd-cap { display: flex; align-items: center; justify-content: center; gap: 5px;
          font-size: 10.5px; line-height: 1.35; color: var(--muted); margin-top: 9px; }
  .rd-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex: none; }
  .rd-dot.focal { background: #3a86c8; }
  .rd-dot.sim { background: #2f9e69; }
  .rd-dot.comp { background: #e6822e; }
  @media (max-width: 700px) { .rd-wrap { grid-template-columns: 1fr; max-width: 320px;
          margin-left: auto; margin-right: auto; } }

  .flags { display: grid; gap: 10px; }
  .flag { display: flex; align-items: flex-start; gap: 10px; font-size: 14.5px;
          padding: 12px 15px; border-radius: 10px; background: #f5f8fb;
          border-left: 4px solid var(--muted); }
  .flag.risk { background: #fdf3f2; border-left-color: #d1483a; }
  .flag.boost { background: #f0f8f3; border-left-color: #4a9d6a; }
  .flag.note { background: #f5f8fb; border-left-color: #9aa8b5; }
  .flag .tag { font-size: 10.5px; font-weight: 700; text-transform: uppercase;
          letter-spacing: .05em; padding: 2px 7px; border-radius: 6px; white-space: nowrap;
          margin-top: 1px; }
  .flag.risk .tag { background: #d1483a; color: #fff; }
  .flag.boost .tag { background: #4a9d6a; color: #fff; }
  .flag.note .tag { background: #9aa8b5; color: #fff; }

  .heat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(330px, 100%), 1fr));
          gap: 10px 34px; }
  table.heat { width: 100%; border-collapse: separate; border-spacing: 0; }
  table.heat th { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em;
          color: var(--muted); font-weight: 700; padding: 4px 6px 10px; text-align: center; }
  table.heat th.mh { text-align: left; padding-left: 2px; }
  table.heat td { padding: 4px 6px; text-align: center; }
  table.heat tr + tr td { border-top: 1px solid var(--line); }
  td.metric { text-align: left; font-weight: 600; font-size: 13.5px; color: #2b3f52;
          white-space: nowrap; padding-left: 2px; }
  .cell { display: inline-block; min-width: 58px; padding: 6px 10px; border-radius: 8px;
          font-size: 14px; font-variant-numeric: tabular-nums; }
  .cell.diff { font-weight: 700; min-width: 52px; }
  .cell.projc { background: #eef4fb; color: #1c5fa8; font-weight: 800; }
  th.pjh { color: #1c5fa8 !important; }
  .na { color: #b6c0ca; }
  .method { font-size: 11.5px; color: var(--muted); margin: 12px 2px 0; line-height: 1.45; }
  .deploy-why { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 6px; }
  .deploy-why li { font-size: 13px; color: #4a5a6a; padding-left: 2px; }
  .deploy-why b { color: #2b3f52; }
  .coach-ctx { display: flex; gap: 10px; align-items: flex-start; margin: 0 0 16px;
          padding: 10px 12px; background: #f4f7fb; border: 1px solid var(--line);
          border-left: 3px solid #7d94b3; border-radius: 8px; }
  .coach-tag { font-size: 10px; font-weight: 800; text-transform: uppercase;
          letter-spacing: .05em; color: #5b78a0; background: #e5edf6;
          padding: 3px 7px; border-radius: 5px; white-space: nowrap; margin-top: 1px; }
  .coach-body { display: grid; gap: 3px; }
  .coach-now { font-size: 13.5px; color: #2b3f52; }
  .coach-now b { color: #1c3350; }
  .coach-last { font-size: 12.5px; color: #55677a; }
  .coach-span { color: #8a99a8; font-size: 11.5px; }
  .coach-new { font-size: 10px; font-weight: 800; text-transform: uppercase;
          letter-spacing: .04em; color: #b5651a; background: #fbeede;
          padding: 1px 6px; border-radius: 4px; margin-left: 4px; }

  .chart { text-align: center; }
  .chart img { max-width: 100%; height: auto; border-radius: 8px; }

  .cat-read { margin-top: 20px; border-top: 1px solid var(--line); padding-top: 16px; }
  .read-head { font-size: 11px; font-weight: 700; text-transform: uppercase;
          letter-spacing: .04em; color: #9aa8b5; margin: 0 0 12px 2px; }
  .fx-line { font-size: 14px; color: #3d4a57; margin: 0 0 2px 2px; }
  .fx-line b { font-size: 16px; letter-spacing: -.01em; }

  .deploy { margin-top: 20px; border-top: 1px solid var(--line); padding-top: 16px; }
  .cat-blurb { font-size: 13.5px; color: #5b6b7b; margin: 0 0 18px; }
  .cat-grid { display: grid; grid-template-columns: minmax(300px, 360px) 1fr; gap: 28px;
          align-items: start; }
  @media (max-width: 720px) { .cat-grid { grid-template-columns: 1fr; } }
  .cat-table { min-width: 0; max-width: 100%; overflow-x: auto; }
  .cat-right { min-width: 0; }
  .chart-sub { font-size: 11px; font-weight: 700; text-transform: uppercase;
          letter-spacing: .04em; color: #9aa8b5; margin: 0 0 8px 2px; }
  .cat-charts + .chart-sub { margin-top: 18px; padding-top: 16px;
          border-top: 1px solid var(--line); }
  .cat-charts { display: flex; flex-wrap: wrap; gap: 6px 14px; }
  .chart-gp { font-size: 11px; color: var(--muted); margin: -2px 2px 10px;
          letter-spacing: .02em; }
  .chart-gp b { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
  .chart-gp .lowgp { opacity: .5; text-decoration: line-through; }
  .chart-note { font-size: 10.5px; color: var(--muted); margin: 8px 2px 0;
          line-height: 1.4; max-width: 560px; font-style: italic; }
  .chart-box { width: 176px; flex: 0 0 auto; }
  .chart-title { font-size: 12px; font-weight: 700; color: #2b3f52; text-align: center;
          margin-bottom: 2px; }
  .qsvg { width: 100%; height: auto; display: block; }
  .chart-none { font-size: 11px; color: #b6c0ca; text-align: center; padding: 26px 0; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty .big { font-size: 44px; margin-bottom: 8px; }
  .err { background: #fff5f4; border: 1px solid #f2c0ba; color: #a3271b;
          padding: 16px 18px; border-radius: 12px; font-size: 15px; }

  /* ---------- HockeyBangers projection banner (the hero) ---------- */
  .hb { border-radius: 18px; overflow: hidden; padding: 30px 34px 26px; margin-bottom: 22px;
          color: #f4f2f6; box-shadow: 0 10px 30px rgba(0,0,0,.30);
          background: linear-gradient(135deg, #201f24 0%, #2b2833 55%, #232028 100%); }
  .hb-eyebrow { font-size: 13px; font-weight: 700; letter-spacing: .14em;
          text-transform: uppercase; color: #cbb98f; margin: 0 0 8px; }
  .hb-title { font-size: 34px; font-weight: 800; letter-spacing: -.005em; line-height: 1.02;
          text-transform: uppercase; margin: 0 0 6px; }
  .hb-name { font-size: 26px; font-weight: 600; margin: 0 0 6px; }
  .hb-sub { font-size: 14px; font-weight: 600; color: var(--muted); margin: 0 0 20px; }
  .team-link { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
  .team-link:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .wn { list-style: none; margin: 0; padding: 0; }
  .wn li { padding: 13px 0; border-top: 1px solid var(--line); font-size: 14px;
          line-height: 1.55; color: var(--ink); }
  .wn li:first-child { border-top: 0; padding-top: 2px; }
  .wn-tag { display: inline-block; font: 700 10px/1 sans-serif; text-transform: uppercase;
          letter-spacing: .06em; color: var(--accent); border: 1px solid var(--accent);
          border-radius: 6px; padding: 3px 6px; margin-right: 8px; vertical-align: 1.5px; }
  .wn a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .wn a:hover { text-decoration: underline; }
  .wn-lede { margin: 0 0 6px; color: var(--muted); font-size: 13.5px; }
  .wn li.wn-hidden { display: none; }
  .wn.wn-expanded li.wn-hidden { display: list-item; }

  /* Header top-row nav — quiet typographic links; active = soft pill. */
  .navlinks { display: flex; align-items: center; gap: 2px; }
  .navbtn { display: inline-flex; align-items: center; padding: 8px 14px;
          font-size: 14px; font-weight: 600; text-decoration: none; white-space: nowrap;
          color: #c6d8ea; border-radius: 8px; transition: background .12s, color .12s; }
  .navbtn:hover { background: rgba(255,255,255,.10); color: #fff; }
  .navbtn.on { background: rgba(255,255,255,.15); color: #fff; }
  .navdiv { width: 1px; align-self: stretch; margin: 6px 8px; background: rgba(255,255,255,.16); }
  a.brandlink { text-decoration: none; color: inherit; }

  /* ---------- Compare view ---------- */
  .cmp-lead-in { margin: 0 0 18px; color: var(--muted); font-size: 14px; max-width: 60ch; }
  .cmp-slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
          gap: 10px; margin-bottom: 8px; }
  .cmp-slot { position: relative; }
  .cmp-slot input { width: 100%; padding: 11px 30px 11px 13px; font-size: 15px;
          border: 1px solid var(--line); border-radius: 10px; background: var(--card);
          color: var(--ink); }
  .cmp-slot input::placeholder { color: var(--muted); }
  .cmp-slot input:focus { outline: none; border-color: var(--accent);
          box-shadow: 0 0 0 3px rgba(43,108,176,.14); }
  .cmp-slot .rm { position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
          width: 20px; height: 20px; border: 0; border-radius: 6px; cursor: pointer;
          background: transparent; color: var(--muted); font-size: 17px; line-height: 1;
          display: none; padding: 0; }
  .cmp-slot.filled .rm { display: block; }
  .cmp-slot .rm:hover { color: #d0563f; background: var(--chip); }
  .cmp-ac { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 50;
          display: none; background: var(--card); border: 1px solid var(--line);
          border-radius: 10px; overflow-y: auto; max-height: 300px;
          box-shadow: 0 10px 28px rgba(16,32,48,.20); }
  .cmp-ac .ac-item { color: var(--ink); border-bottom: 1px solid var(--line); }
  .cmp-ac .ac-item.on, .cmp-ac .ac-item:hover { background: var(--chip); }
  .cmp-actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 4px 0 22px; }
  .cmp-add { padding: 9px 15px; font-size: 13.5px; font-weight: 600; cursor: pointer;
          color: var(--accent); background: var(--chip); border: 1px dashed #b8ccdf;
          border-radius: 9px; }
  .cmp-add:hover { background: #e2edf7; }
  .cmp-add[disabled] { opacity: .45; cursor: not-allowed; }
  .cmp-clear { padding: 9px 15px; font-size: 13.5px; font-weight: 600; cursor: pointer;
          color: var(--muted); background: transparent; border: 1px solid var(--line);
          border-radius: 9px; }
  .cmp-empty { padding: 40px 10px; text-align: center; color: var(--muted); font-size: 15px; }
  .cmp-tablewrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.cmp { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 100%; }
  table.cmp th, table.cmp td { padding: 11px 14px; text-align: right;
          font-variant-numeric: tabular-nums; white-space: nowrap; }
  table.cmp thead th { position: sticky; top: 0; background: var(--card); z-index: 3; }
  table.cmp thead th.mlab { z-index: 4; }
  table.cmp .phead { font-size: 15px; font-weight: 800; color: var(--ink);
          letter-spacing: -.01em; }
  table.cmp .phead a { text-decoration: none; color: inherit; }
  table.cmp .phead a:hover { color: var(--accent); text-decoration: underline; }
  table.cmp .psub { display: block; font-size: 11px; font-weight: 600; color: var(--muted);
          text-transform: none; letter-spacing: 0; margin-top: 2px; }
  table.cmp .mlab { text-align: left; font-weight: 600; font-size: 13px; color: var(--ink);
          position: sticky; left: 0; background: var(--card); z-index: 2; }
  table.cmp .mlab span { display: block; font-size: 10.5px; font-weight: 500;
          color: var(--muted); }
  table.cmp tbody tr + tr td, table.cmp tbody tr + tr th { border-top: 1px solid var(--line); }
  table.cmp tbody tr.sec td, table.cmp tbody tr.sec th { background: var(--bg); }
  table.cmp tbody tr.sec .mlab { background: var(--bg); font-size: 11px; font-weight: 800;
          text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  table.cmp tbody td { position: relative; }
  .cmp-val { font-size: 16px; font-weight: 700; color: var(--ink); }
  table.cmp tbody td.win .cmp-val { font-weight: 800; }
  table.cmp tbody td.win::before { content: ""; position: absolute; left: 0; top: 6px;
          bottom: 6px; width: 3px; border-radius: 0 3px 3px 0; background: var(--accent); }
  .cmp-lead-tag { display: inline-block; margin-left: 6px; font-size: 9.5px; font-weight: 800;
          letter-spacing: .04em; color: var(--accent); vertical-align: 2px; }

  /* Radar / spider overlay */
  .cmp-radar-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px;
          margin: 6px 0 24px; }
  .cmp-radar { width: 100%; max-width: 460px; }
  .cmp-radar svg { width: 100%; height: auto; overflow: visible; }
  .cmp-radar .grid { fill: none; stroke: var(--line); stroke-width: 1; }
  .cmp-radar .spoke { stroke: var(--line); stroke-width: 1; }
  .cmp-radar .axlab { fill: var(--muted); font-size: 11px; font-weight: 700;
          font-family: inherit; }
  .cmp-radar .poly { stroke-width: 2; stroke-linejoin: round; }
  .cmp-radar .vtx { stroke: var(--card); stroke-width: 1.5; }
  .cmp-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; justify-content: center; }
  .cmp-leg { display: inline-flex; align-items: center; gap: 7px; font-size: 13px;
          font-weight: 600; cursor: pointer; color: var(--ink); padding: 4px 8px;
          border-radius: 8px; user-select: none; }
  .cmp-leg:hover { background: var(--chip); }
  .cmp-leg i { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 auto; }
  .cmp-leg.off { opacity: .34; }
  .cmp-leg.off i { background: var(--muted) !important; }
  .cmp-radar-note { font-size: 11.5px; color: var(--muted); text-align: center; }

  /* ---------- Regression Explorer ---------- */
  .rx-hero { background: linear-gradient(135deg, #16283a 0%, #22415c 55%, #2a3f2e 100%);
          border-radius: 20px; padding: 34px 30px 30px; color: #fff; margin-bottom: 22px;
          box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .rx-hero::after { content: ""; position: absolute; right: -60px; top: -60px; width: 240px;
          height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(55,200,130,.22), transparent 70%); }
  .rx-eyebrow { font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
          color: #8fd7b0; margin: 0 0 8px; }
  .rx-title { font-size: 34px; font-weight: 900; letter-spacing: -.02em; margin: 0 0 12px;
          line-height: 1.05; }
  .rx-lede { font-size: 15px; line-height: 1.55; color: #cfe0ef; max-width: 70ch; margin: 0 0 18px; }
  .rx-legend { display: flex; flex-wrap: wrap; gap: 10px 20px; font-size: 13.5px; font-weight: 600; }

  .rx-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .rx-tab { padding: 11px 18px; font-size: 14.5px; font-weight: 700; cursor: pointer;

  .rx-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .rx-col-head { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 800;
          letter-spacing: -.01em; margin: 0 0 14px; padding-bottom: 10px; border-bottom: 2px solid var(--line); }
  .rx-col-head .rx-pill { font-size: 11px; font-weight: 800; letter-spacing: .05em; padding: 3px 9px;
          border-radius: 999px; }
  .rx-col.up .rx-col-head { color: #1c8f5a; }
  .rx-col.up .rx-pill { background: rgba(55,200,130,.15); color: #1c8f5a; }
  .rx-col.down .rx-col-head { color: #c94f38; }
  .rx-col.down .rx-pill { background: rgba(236,106,82,.15); color: #c94f38; }
  :root[data-theme="dark"] .rx-col.up .rx-col-head, :root[data-theme="dark"] .rx-col.up .rx-pill { color: #4fd696; }
  :root[data-theme="dark"] .rx-col.down .rx-col-head, :root[data-theme="dark"] .rx-col.down .rx-pill { color: #f0826c; }
  /* Interactive web card (the site treatment — distinct from the downloadable PNG) */
  .rx-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
          padding: 18px 18px 14px; margin-bottom: 18px; box-shadow: var(--shadow);
          transition: transform .14s, box-shadow .14s; }
  .rx-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(16,32,48,.16); }
  .rx-name { font-size: 21px; font-weight: 800; letter-spacing: -.01em; color: var(--ink); }
  .rx-meta { font-size: 12.5px; font-weight: 600; color: var(--muted); margin: 2px 0 12px; }
  .rx-verdict { font-size: 15.5px; font-weight: 700; line-height: 1.35; color: var(--ink); margin: 0 0 8px; }
  .rx-explain { font-size: 13px; line-height: 1.5; color: var(--muted); margin: 0 0 16px; }
  .rx-mrow { display: grid; grid-template-columns: 92px 1fr auto; align-items: center; gap: 12px; margin: 10px 0; }
  .rx-ml { font-size: 12.5px; font-weight: 700; color: var(--ink); text-align: right; }
  .rx-mtrack { position: relative; height: 12px; background: var(--bg); border-radius: 6px; }
  .rx-mtrack i.cur { position: absolute; left: 0; top: 0; height: 100%; border-radius: 6px; transition: width .5s cubic-bezier(.2,.7,.2,1); }
  .rx-col.up .rx-mtrack i.cur { background: #37c882; }
  .rx-col.down .rx-mtrack i.cur { background: #ec6a52; }

          background: var(--ink); border-radius: 2px; z-index: 2; }
  .rx-legend2 { display: flex; gap: 18px; font-size: 11px; color: var(--muted); margin: 14px 0 4px; padding-left: 104px; }
  .rx-legend2 span { display: inline-flex; align-items: center; gap: 6px; }

  .rx-legend2 .rx-sit { margin-left: auto; font-weight: 700; }
  .rx-mv { font-size: 14.5px; font-weight: 800; font-variant-numeric: tabular-nums; text-align: right; min-width: 66px; }
  .rx-mv em { display: block; font-size: 10px; font-weight: 600; font-style: normal; color: var(--muted); margin-top: 1px; }
  .rx-col.up .rx-mv { color: #1c8f5a; }
  .rx-col.down .rx-mv { color: #c94f38; }
  :root[data-theme="dark"] .rx-col.up .rx-mv { color: #4fd696; }
  :root[data-theme="dark"] .rx-col.down .rx-mv { color: #f0826c; }
  .rx-stat { font-size: 12px; color: var(--muted); margin: 14px 0 10px; line-height: 1.45; }
  .rx-model { font-size: 13.5px; font-weight: 800; padding: 9px 12px; border-radius: 10px; margin-bottom: 12px; }
  .rx-col.up .rx-model { background: rgba(55,200,130,.12); color: #1c8f5a; }
  .rx-col.down .rx-model { background: rgba(236,106,82,.12); color: #c94f38; }
  :root[data-theme="dark"] .rx-col.up .rx-model { color: #4fd696; }
  :root[data-theme="dark"] .rx-col.down .rx-model { color: #f0826c; }
  .rx-actions { display: flex; gap: 8px; }
  .rx-btn { flex: 1; padding: 9px 12px; font-size: 12.5px; font-weight: 700; cursor: pointer;
          border: 1px solid var(--line); border-radius: 9px; background: transparent; color: var(--ink);

  /* ---------- Mobile / narrow screens ---------- */
  html, body { max-width: 100%; overflow-x: hidden; }

    for(var i=0;i<N;i++){
      var e=pt(cx,cy,R,-90+i*360/N,1);
      svg+='<line class="spoke" x1="'+cx+'" y1="'+cy+'" x2="'+e[0].toFixed(1)+'" y2="'+e[1].toFixed(1)+'"/>';
      var lp=pt(cx,cy,R,-90+i*360/N,1.17), cos=Math.cos((-90+i*360/N)*Math.PI/180);
      var anc=cos>0.3?'start':(cos<-0.3?'end':'middle');
      svg+='<text class="axlab" x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+4).toFixed(1)+'" text-anchor="'+anc+'">'+AXES[i].lab+'</text>';
    }
    sel.forEach(function(n,si){
      if(hidden[n])return;
      var col=COLORS[si%COLORS.length], pts=[], verts='';
      for(var i=0;i<N;i++){
        var frac=amax[i]>0?Math.max(0,Math.min(1,(+CMP[n][AXES[i].k]||0)/amax[i])):0;
        var xy=pt(cx,cy,R,-90+i*360/N,frac); pts.push(xy[0].toFixed(1)+','+xy[1].toFixed(1));
        verts+='<circle class="vtx" cx="'+xy[0].toFixed(1)+'" cy="'+xy[1].toFixed(1)+'" r="3" fill="'+col+'"/>';
      }
      svg+='<polygon class="poly" points="'+pts.join(' ')+'" fill="'+col+'" fill-opacity="0.14" stroke="'+col+'"/>'+verts;
    });
    svg+='</svg>';
    var leg=sel.map(function(n,si){
      var col=COLORS[si%COLORS.length];
      return '<span class="cmp-leg'+(hidden[n]?' off':'')+'" data-name="'+esc(n)+'"><i style="background:'+col+'"></i>'+esc(n)+'</span>';
    }).join('');
    radarHost.innerHTML='<div class="cmp-radar-wrap"><div class="cmp-radar">'+svg+'</div>'+
      '<div class="cmp-legend">'+leg+'</div>'+
      '<div class="cmp-radar-note">Each axis scaled to the leader among the selected players. Click a name to toggle it.</div></div>';
  }
  radarHost.addEventListener('click',function(e){
    var chip=e.target.closest('.cmp-leg'); if(!chip)return;
    var n=chip.getAttribute('data-name'); hidden[n]=!hidden[n];
    paintRadar(slots.filter(function(m){return m&&CMP[m];}));
  });

  function paint(){
    var sel=slots.filter(function(n){return n&&CMP[n];});
    if(!sel.length){
      out.innerHTML='<div class="cmp-empty">Pick players above to compare their projections.</div>';
      radarHost.innerHTML=''; syncURL(); return;
    }
    var recs=sel.map(function(n){return CMP[n];});
    var h='<table class="cmp"><thead><tr><th class="mlab">&nbsp;</th>';
    sel.forEach(function(n){
      var r=CMP[n], hf=href(n), team=r.team||'', pos=r.pos||'',
          nm=hf?'<a href="'+hf+'">'+esc(n)+'</a>':esc(n);
      h+='<th class="phead">'+nm+'<span class="psub">'+esc(pos)+(team?' · '+esc(team):'')+'</span></th>';
    });
    h+='</tr></thead><tbody>';
    ROWS.forEach(function(row){
      if(row.sec){
        h+='<tr class="sec"><th class="mlab">'+esc(row.sec)+'</th>';
        for(var i=0;i<sel.length;i++)h+='<td></td>';
        h+='</tr>'; return;
      }
      // per-row heatmap: tint each cell by where its value sits between the row's min and
      // max (best = darkest), so you scan colour across the whole cell instead of a stub bar.
      var nums=recs.map(function(r){var v=rawVal(r,row); return v===null?null:+v;});
      var defined=nums.filter(function(v){return v!==null;});
      var lo=defined.length?Math.min.apply(null,defined):0,
          hi=defined.length?Math.max.apply(null,defined):0;
      var best=null;
      if(!row.neutral&&defined.length)best=row.lower?lo:hi;
      var lab='<th class="mlab">'+esc(row.lab)+(row.sub?'<span>'+esc(row.sub)+'</span>':'')+'</th>';
      h+='<tr>'+lab;
      recs.forEach(function(r,i){
        var v=nums[i], win=(best!==null&&v!==null&&v===best&&sel.length>1), style='';
        if(!row.neutral&&v!==null&&hi>lo){
          var t=(v-lo)/(hi-lo); if(row.lower)t=1-t;         // 0=worst … 1=best
          style=' style="background:rgba(var(--accent-rgb),'+(0.05+0.36*t).toFixed(3)+')"';
        }
        h+='<td class="'+(win?'win':'')+'"'+style+'><span class="cmp-val">'+fmtVal(r,row)+'</span></td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table>';
    out.innerHTML=h;
    paintRadar(sel);
    syncURL();
  }

  // ---- autocomplete on a slot input ---------------------------------------
  function attachAC(input, idx){
    var box=input.nextElementSibling, items=[], active=-1;
    function close(){box.style.display='none';box.innerHTML='';items=[];active=-1;}
    function commit(n){input.value=n; slots[idx]=n; markFilled(idx); close(); paint();}
    function hl(){Array.prototype.forEach.call(box.children,function(el,i){el.className='ac-item'+(i===active?' on':'');if(i===active&&el.scrollIntoView)el.scrollIntoView({block:'nearest'});});}
    function show(){
      items=matches(input.value); active=(items.length?0:-1);
      if(!items.length){close();return;}
      box.innerHTML=items.map(function(n,i){return '<div class="ac-item'+(i===0?' on':'')+'" data-i="'+i+'">'+esc(n)+'</div>';}).join('');
      box.style.display='block';
      Array.prototype.forEach.call(box.children,function(el){
        el.addEventListener('mousedown',function(e){e.preventDefault();commit(items[+el.getAttribute('data-i')]);});
      });
    }
    function onType(){
      if(!input.value.trim()){close(); if(slots[idx]){slots[idx]=null; markFilled(idx); paint();} return;}
      show();
    }
    input.addEventListener('input',onType);
    input.addEventListener('focus',function(){if(input.value)input.select(); if(input.value.trim())show();});
    input.addEventListener('blur',function(){setTimeout(function(){
      close(); var r=resolve(input.value);
      if(r){if(slots[idx]!==r){slots[idx]=r;paint();} input.value=r; markFilled(idx);}
      else{input.value=slots[idx]||''; markFilled(idx);}
    },140);});
    input.addEventListener('keydown',function(e){
      if(box.style.display!=='block'){
        if(e.key==='ArrowDown'){show();e.preventDefault();}
        else if(e.key==='Enter'){var r=resolve(input.value); if(r)commit(r); e.preventDefault();}
        return;
      }
      if(e.key==='ArrowDown'){active=Math.min(active+1,items.length-1);hl();e.preventDefault();}
      else if(e.key==='ArrowUp'){active=Math.max(active-1,0);hl();e.preventDefault();}
      else if(e.key==='Enter'){commit(items[active>=0?active:0]);e.preventDefault();}
      else if(e.key==='Escape'){close();e.preventDefault();}
    });
  }
  function markFilled(idx){
    var slot=slotwrap.children[idx]; if(!slot)return;
    if(slots[idx])slot.classList.add('filled'); else slot.classList.remove('filled');
  }

  // ---- build / add / remove slot inputs -----------------------------------
  function buildSlot(idx){
    var d=document.createElement('div'); d.className='cmp-slot';
    var inp=document.createElement('input'); inp.type='text';
    inp.placeholder='Player '+(idx+1)+'…';
    inp.autocomplete='off'; inp.autocapitalize='off'; inp.spellcheck=false;
    if(slots[idx])inp.value=slots[idx];
    var ac=document.createElement('div'); ac.className='cmp-ac';
    var rm=document.createElement('button'); rm.type='button'; rm.className='rm';
    rm.innerHTML='&times;'; rm.title='Remove';
    rm.addEventListener('click',function(){removeSlot(idx);});
    d.appendChild(inp); d.appendChild(ac); d.appendChild(rm);
    slotwrap.appendChild(d);
    attachAC(inp, idx);
    if(slots[idx])d.classList.add('filled');
  }
  function rebuildSlots(){
    slotwrap.innerHTML='';
    for(var i=0;i<slots.length;i++)buildSlot(i);
    addBtn.disabled = slots.length>=MAX;
  }
  function addSlot(){ if(slots.length>=MAX)return; slots.push(null); rebuildSlots(); slotwrap.children[slots.length-1].querySelector('input').focus(); }
  function removeSlot(idx){
    if(slots.length>MIN){slots.splice(idx,1);} else {slots[idx]=null;}
    rebuildSlots(); paint();
  }
  addBtn.addEventListener('click',addSlot);
  clearBtn.addEventListener('click',function(){slots=slots.map(function(){return null;}); if(slots.length>MIN)slots=slots.slice(0,MIN); rebuildSlots(); paint(); history.replaceState(null,'',location.pathname);});

  // ---- URL <-> state ------------------------------------------------------
  // Similar players: same primary position, closest in banger score (fantasy peers you'd
  // actually weigh against each other on draft day). Pads from the overall-nearest if a
  // position is thin.
  function similarTo(seed, n){
    var s=CMP[seed]; if(!s)return [];
    var sb=+s.banger||0, pos=(s.pos||'').split(',')[0];
    function near(a,b){return Math.abs((+CMP[a].banger||0)-sb)-Math.abs((+CMP[b].banger||0)-sb);}
    var pool=Object.keys(CMP).filter(function(m){
      return m!==seed && (CMP[m].pos||'').split(',').indexOf(pos)>=0;});
    pool.sort(near);
    var pick=pool.slice(0,n);
    if(pick.length<n){
      var extra=Object.keys(CMP).filter(function(m){return m!==seed && pick.indexOf(m)<0;});
      extra.sort(near); pick=pick.concat(extra.slice(0,n-pick.length));
    }
    return pick;
  }
  function syncURL(){
    var picked=slots.filter(function(n){return n&&CMP[n];});
    var params=new URLSearchParams(location.search);
    params.delete('from');
    if(picked.length)params.set('p', picked.map(encodeURIComponent).join(',')); else params.delete('p');
    var qs=params.toString();
    history.replaceState(null,'', location.pathname+(qs?'?'+qs:''));
  }
  function initFromURL(){
    var params=new URLSearchParams(location.search), p=params.get('p');
    if(p){
      var want=p.split(',').map(function(s){return resolve(decodeURIComponent(s));}).filter(Boolean);
      if(want.length){slots=want.slice(0,MAX); while(slots.length<MIN)slots.push(null); return true;}
    }
    var from=params.get('from');
    if(from){
      var seed=resolve(decodeURIComponent(from));
      if(seed&&CMP[seed]){
        slots=[seed].concat(similarTo(seed, MIN-1)).slice(0,MAX);
        while(slots.length<MIN)slots.push(null);
        return true;
      }
    }
    return false;
  }
  function defaults(){
    var all=Object.keys(CMP).map(function(n){return [n,+CMP[n].rk||9999];});
    all.sort(function(a,b){return a[1]-b[1];});
    slots=all.slice(0,MIN).map(function(x){return x[0];});
  }
  if(!initFromURL())defaults();
  rebuildSlots(); paint();
})();
</script>
</div>
<script>
(function(){
  var input=document.getElementById('q'), box=document.getElementById('ac'),
      form=document.getElementById('searchform'), names=window.__PLAYERS__||[],
      hrefs=window.__HREFS__||{}, staticMode=Object.keys(hrefs).length>0,
      items=[], active=-1, initialQ=input.value;
  function esc(s){return s.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function close(){box.style.display='none';box.innerHTML='';items=[];active=-1;}
  function goto(n){var h=hrefs[n];if(!h){for(var k in hrefs){if(k.toLowerCase()===n.toLowerCase()){h=hrefs[k];break;}}}if(h){window.location=h;return true;}return false;}
  function pick(n){input.value=n;close();if(staticMode&&goto(n))return;form.submit();}
  form.addEventListener('submit',function(e){if(staticMode){e.preventDefault();goto(input.value.trim());}});
  function hl(){Array.prototype.forEach.call(box.children,function(el,i){el.className='ac-item'+(i===active?' on':'');if(i===active)el.scrollIntoView({block:'nearest'});});}
  function filter(){
    var q=input.value.trim().toLowerCase();
    if(!q){close();return;}
    var starts=[],contains=[];
    for(var i=0;i<names.length;i++){
      var idx=names[i].toLowerCase().indexOf(q);
      if(idx===0)starts.push(names[i]);else if(idx>0)contains.push(names[i]);
    }
    items=starts.concat(contains).slice(0,25);active=-1;
    if(!items.length){close();return;}
    box.innerHTML=items.map(function(n,i){return '<div class="ac-item" role="option" data-i="'+i+'">'+esc(n)+'</div>';}).join('');
    box.style.display='block';
    Array.prototype.forEach.call(box.children,function(el){
      el.addEventListener('mousedown',function(e){e.preventDefault();pick(items[+el.getAttribute('data-i')]);});
    });
  }
  input.addEventListener('input',filter);
  // Focusing the box to pick a new player clears the current name (no manual delete).
  // Only clears when it still holds the committed name, so mid-typing survives a re-focus.
  input.addEventListener('focus',function(){if(input.value===initialQ){input.value='';}filter();});
  input.addEventListener('keydown',function(e){
    if(box.style.display!=='block')return;
    if(e.key==='ArrowDown'){active=Math.min(active+1,items.length-1);hl();e.preventDefault();}
    else if(e.key==='ArrowUp'){active=Math.max(active-1,0);hl();e.preventDefault();}
    else if(e.key==='Enter'&&active>=0){pick(items[active]);e.preventDefault();}
    else if(e.key==='Escape'){close();}
  });
  document.addEventListener('click',function(e){if(!form.contains(e.target))close();});
})();
</script>
</body></html>
